add_newline = false
# Reduce scan timeout for faster prompt rendering (default: 30ms)
scan_timeout = 5
# Limit command execution time (default: 500ms)
command_timeout = 500
format = """

[┌](dimmed blue) $git_branch$nodejs$python$package$cmd_duration$aws
$character$directory$git_commit$git_state$git_status
"""

[aws]
format = '[($profile )(\($region\) )(\[$duration\] )]($style)'
style = "bold yellow"

[character]
error_symbol = "[└─>](dimmed blue) [✗](dimmed red)"
success_symbol = "[└─>](dimmed blue)"
vicmd_symbol = "[└─<](dimmed blue)"

[cmd_duration]
format = "([|](dimmed blue) [task took $duration]($style)) "
min_time = 2_000
style = "dimmed yellow"

[directory]
format = "([$read_only]($read_only_style) )[$path]($style) "
read_only = ""
style = "bold blue"

[docker_context]
symbol = " "

[hostname]
format = "[@$hostname]($style)"
ssh_only = false
style = "dimmed blue"

[git_branch]
format = '([$symbol$branch]($style) )'
symbol = " "
style = "bold green"

[git_status]
stashed = ""
style = "bold red"

[golang]
symbol = " "

[memory_usage]
symbol = " "

[nix_shell]
symbol = " "

[nodejs]
detect_files = [".nvmrc"]
format = "([|](dimmed blue) [$symbol($version)]($style)) "
style = "dimmed blue"

[package]
display_private = true
format = "([|](dimmed blue) [$symbol$version]($style)) "
style = "dimmed 208"
symbol = "@"

[python]
format = "([|](dimmed blue) [venv:$virtualenv](yellow)) "
detect_folders = [".venv"]

[username]
format = "[$user]($style)"
show_always = true
style_root = "bold inverted blue"
style_user = "bold dimmed blue"
